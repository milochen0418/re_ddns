// /etc/bind/named.conf  –  Main BIND9 configuration for re_ddns Docker
// ─────────────────────────────────────────────────────────────────────

// Access-control: allow queries from any, updates only from localhost
acl "trusted" {
    127.0.0.0/8;
    172.16.0.0/12;   // Docker networks
    192.168.0.0/16;
    10.0.0.0/8;
};

options {
    directory "/var/cache/bind";

    // Listen on all interfaces
    listen-on    { any; };
    listen-on-v6 { any; };

    // Allow queries from anywhere (this is a DDNS server)
    allow-query { any; };

    // Disable recursion – this is authoritative only
    recursion yes;

    // Forward all non-local queries to upstream DNS so the host
    // can still resolve the internet when 127.0.0.1 is the primary DNS.
    // BIND9 answers authoritatively for its own zones first;
    // everything else is forwarded to the system's existing resolvers.
    // __FORWARDERS__ is replaced at container startup by entrypoint.sh
    // with whatever nameservers /etc/resolv.conf already has.
    forwarders { __FORWARDERS__ };
    forward only;

    // Only allow recursive queries from trusted (local/Docker) networks.
    // Docker Desktop for Mac forwards with the host's public IP, so we
    // must use "any" here for the local dev scenario to work correctly.
    allow-recursion { any; };

    // DNSSEC validation (off for simplicity; turn on in production)
    dnssec-validation no;

    // Disable version exposure
    version "not disclosed";

    // Logging
    querylog no;
};

// ── Logging ──
logging {
    channel default_log {
        file "/var/log/bind/named.log" versions 3 size 5m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    channel update_log {
        file "/var/log/bind/update.log" versions 3 size 5m;
        severity debug;
        print-time yes;
        print-category yes;
        print-severity yes;
    };
    category default { default_log; };
    category update { update_log; };
    category update-security { update_log; };
};

// ── rndc control channel ──
controls {
    inet 127.0.0.1 port 953 allow { 127.0.0.1; } keys { "ddns-key"; };
};

// ── Include TSIG keys and zone declarations ──
include "/etc/bind/named.conf.local";
